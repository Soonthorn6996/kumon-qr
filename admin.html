<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUMON โพนพิสัย — จัดการนักเรียน</title>
  <style>
    :root {
      --bg:      #eaf4fb;
      --navy:    #1a4a6e;
      --primary: #f97316;
      --pri-h:   #ea6c0a;
      --gold:    #c9a227;
      --blue:    #5ba4cf;
      --text:    #1a202c;
      --muted:   #5a7a92;
      --border:  #c5e3f2;
      --card:    #ffffff;

      /* Subject palette from infinity logo */
      --math-bg: #fff7ed; --math-fg: #c2410c; --math-bd: #fdba74;
      --thai-bg: #f5f3ff; --thai-fg: #6d28d9; --thai-bd: #c4b5fd;
      --eng-bg:  #eff6ff; --eng-fg:  #1d4ed8; --eng-bd:  #93c5fd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      background: var(--navy);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-brand img {
      width: 36px; height: 36px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--gold);
    }

    .nav-brand span { font-weight: 700; font-size: 1rem; color: #fff; letter-spacing: .3px; }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-email {
      font-size: .78rem; color: #a0c4dd;
      max-width: 150px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .nav-link {
      color: #a0c4dd; font-size: .8rem; text-decoration: none;
      padding: 5px 11px; border: 1px solid #3a6a90; border-radius: 6px;
    }
    .nav-link:hover { background: #3a6a90; color: #fff; }

    .nav-logout {
      background: transparent; border: 1px solid #3a6a90; color: #a0c4dd;
      padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: .8rem;
    }
    .nav-logout:hover { background: #3a6a90; color: #fff; }

    /* ── Page Header ─────────────────────────────────── */
    .page-top {
      background: linear-gradient(135deg, var(--navy) 0%, #2a6496 100%);
      padding: 22px 20px;
      color: white;
    }

    .page-top-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .page-top h2 { font-size: 1.2rem; font-weight: 700; }
    .page-top p  { color: #a0c4dd; font-size: .82rem; margin-top: 3px; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white; border: none;
      padding: 10px 20px; border-radius: 10px;
      font-size: .9rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(249,115,22,.35);
      transition: opacity .2s, transform .1s;
    }
    .btn-add:hover  { opacity: .9; }
    .btn-add:active { transform: scale(.97); }

    .btn-secondary {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid var(--eng-bd);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: .86rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-secondary:hover { background: #dbeafe; }

    .list-tools {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 16px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .search-box {
      position: relative;
      min-width: 0;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: .95rem;
      padding: 0 42px 0 42px;
      box-shadow: 0 2px 10px rgba(26,74,110,.06);
      transition: border-color .2s, box-shadow .2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(91,164,207,.2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .95rem;
      pointer-events: none;
    }

    .clear-search {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 7px;
      background: #f1f5f9;
      color: var(--muted);
      cursor: pointer;
      font-size: .8rem;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .clear-search.show { display: flex; }
    .clear-search:hover { color: var(--navy); background: #e2e8f0; }

    .result-count {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    /* ── Student Grid ────────────────────────────────── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── Student Card ────────────────────────────────── */
    .student-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 10px rgba(26,74,110,.07);
      border-left: 4px solid var(--gold);
      transition: transform .15s, box-shadow .15s;
    }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,74,110,.12); }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }

    .avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #ec4899, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(249,115,22,.3);
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; color: var(--navy); font-size: .97rem; }
    .card-nick { color: var(--muted); font-size: .8rem; margin-top: 2px; }

    .card-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: -2px; }

    .btn-qr {
      display: flex; align-items: center; gap: 5px;
      background: #eff6ff; border: 1px solid var(--eng-bd); color: #1d4ed8;
      padding: 5px 10px; border-radius: 7px; cursor: pointer; font-size: .78rem; font-weight: 600;
    }
    .btn-qr:hover { background: #dbeafe; }

    .btn-icon {
      background: none; border: none; cursor: pointer;
      padding: 5px 8px; border-radius: 7px; font-size: .8rem; color: #94a3b8;
    }
    .btn-icon.edit:hover { background: #fefce8; color: #a16207; }

    .btn-del {
      background: none; border: none; cursor: pointer;
      padding: 5px 8px; border-radius: 7px; font-size: .85rem; color: #94a3b8;
    }
    .btn-del:hover { background: #fff5f5; color: #e53e3e; }

    .card-subjects { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }

    .badge {
      padding: 3px 11px; border-radius: 20px;
      font-size: .73rem; font-weight: 700; letter-spacing: .2px;
    }
    .badge-math    { background: var(--math-bg); color: var(--math-fg); border: 1px solid var(--math-bd); }
    .badge-thai    { background: var(--thai-bg); color: var(--thai-fg); border: 1px solid var(--thai-bd); }
    .badge-english { background: var(--eng-bg);  color: var(--eng-fg);  border: 1px solid var(--eng-bd);  }
    .badge-default { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }

    .no-sub { color: #94a3b8; font-size: .78rem; }

    /* ── States ─────────────────────────────────────── */
    .state-box {
      grid-column: 1/-1; text-align: center;
      padding: 64px 20px; color: #94a3b8;
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 10px; }
    .state-box p { font-size: .95rem; }

    /* ── Modal Overlay ───────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,35,55,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }

    .modal-overlay[hidden],
    .qr-section[hidden] {
      display: none !important;
    }

    .modal-box {
      background: white; border-radius: 18px; padding: 26px 24px;
      width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
    }

    .modal-box.wide { max-width: 740px; }

    .modal-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 22px;
    }

    .modal-head h3 { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .modal-head p  { font-size: .8rem; color: var(--muted); margin-top: 3px; }

    .btn-close {
      background: #f1f5f9; border: none; width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      color: var(--muted); flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
    }
    .btn-close:hover { background: #e2e8f0; }

    /* ── Add Form ────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block; font-size: .82rem;
      font-weight: 600; color: var(--navy); margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .95rem; color: var(--text); background: #f5fbff;
      transition: border-color .2s, box-shadow .2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none; border-color: var(--blue); background: #fff;
      box-shadow: 0 0 0 3px rgba(91,164,207,.2);
    }

    .form-error {
      background: #fff7ed; border: 1px solid var(--math-bd); color: var(--math-fg);
      border-radius: 10px; padding: 10px 14px; font-size: .875rem;
      margin-bottom: 12px; display: none;
    }

    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 12px rgba(249,115,22,.3); margin-top: 4px;
      transition: opacity .2s;
    }
    .btn-submit:hover    { opacity: .9; }
    .btn-submit:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    /* ── QR Grid ─────────────────────────────────────── */
    .qr-grid {
      display: flex; flex-wrap: wrap;
      gap: 16px; justify-content: center; padding: 4px 0;
    }

    .qr-card {
      background: #f8fafc; border-radius: 14px;
      padding: 20px 16px; text-align: center;
      border: 2px solid var(--border); min-width: 170px;
    }

    .qr-card .qr-code-host,
    .qr-card .qr-code-host canvas,
    .qr-card .qr-code-host img,
    .qr-card .qr-print-img {
      width: 160px;
      height: 160px;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
    }

    .qr-card .qr-print-img {
      display: none;
    }

    .qr-error-text {
      width: 160px;
      height: 160px;
      border: 1px dashed #fca5a5;
      border-radius: 6px;
      background: #fff7ed;
      color: #b91c1c;
      display: grid;
      place-items: center;
      margin: 0 auto;
      padding: 12px;
      font-size: .82rem;
      font-weight: 700;
    }

    .qr-sub  { font-weight: 700; font-size: .95rem; margin-top: 10px; }
    .qr-name { color: var(--muted); font-size: .78rem; margin-top: 3px; }

    .qr-card.math    { border-color: var(--math-bd); }
    .qr-card.math    .qr-sub { color: var(--math-fg); }
    .qr-card.thai    { border-color: var(--thai-bd); }
    .qr-card.thai    .qr-sub { color: var(--thai-fg); }
    .qr-card.english { border-color: var(--eng-bd); }
    .qr-card.english .qr-sub { color: var(--eng-fg); }

    .qr-footer { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

    .qr-section {
      max-width: 1100px;
      margin: 0 auto 28px;
      padding: 0 16px;
    }

    .qr-section-box {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(26,74,110,.08);
      border: 1px solid rgba(197,227,242,.75);
    }

    .qr-section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .qr-section-head h3 {
      color: var(--navy);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .qr-section-head p {
      color: var(--muted);
      font-size: .8rem;
      margin-top: 3px;
    }

    .btn-print {
      background: var(--navy); color: white; border: none;
      padding: 11px 30px; border-radius: 10px;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 12px rgba(26,74,110,.25);
    }
    .btn-print:hover { background: #2a6496; }

    .btn-hide {
      background: #f1f5f9;
      color: var(--muted);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-hide:hover { background: #e2e8f0; color: var(--navy); }

    .qr-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 20px;
      padding: 12px 20px; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 6px 20px rgba(0,0,0,.2);
      transform: translateY(80px); opacity: 0;
      transition: transform .3s, opacity .3s;
      z-index: 500; max-width: 280px; pointer-events: none;
    }
    .toast.show   { transform: translateY(0); opacity: 1; }
    .toast.ok     { background: #15803d; }
    .toast.err    { background: #b91c1c; }

    /* ── Form extras ─────────────────────────────────── */
    .form-hint { font-size: .75rem; color: var(--muted); margin-top: 4px; }
    .form-opt  { font-weight: 400; color: var(--muted); font-size: .78rem; }

    /* ── Subject Filter ─────────────────────────────── */
    .subject-filter {
      max-width: 1100px;
      margin: 0 auto;
      padding: 8px 16px 0;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--navy);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
    }
    .filter-btn.active      { background: var(--navy); border-color: var(--navy); color: #fff; }
    .filter-btn.math.active { background: #c2410c; border-color: #c2410c; color: #fff; }
    .filter-btn.thai.active { background: #6d28d9; border-color: #6d28d9; color: #fff; }
    .filter-btn.eng.active  { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

    /* ── Mobile Responsive ───────────────────────────── */
    @media (max-width: 640px) {
      .nav-email { display: none; }
      .nav-link  { display: none; }

      .page-top-inner { flex-wrap: wrap; gap: 10px; }
      .page-top h2 { font-size: 1.05rem; }

      .list-tools {
        grid-template-columns: 1fr;
        padding-top: 14px;
      }
      .result-count { padding-left: 2px; }

      .student-grid { grid-template-columns: 1fr; }

      /* Bottom sheet modal on mobile */
      .modal-overlay {
        align-items: flex-end;
        padding: 0;
      }
      .modal-box {
        border-radius: 20px 20px 0 0;
        max-height: 92vh;
        padding: 22px 18px;
      }
      .modal-box.wide { max-width: 100%; }

      .qr-grid { gap: 12px; }
      .qr-card { min-width: 140px; padding: 14px 12px; }

    }

    @media (min-width: 641px) and (max-width: 900px) {
      .student-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media print {
      .nav-right,
      .page-top,
      .list-tools,
      .container,
      .modal-overlay,
      .qr-actions,
      .btn-hide,
      .app-version-badge {
        display: none !important;
      }
      body {
        background: white !important;
      }
      .qr-section {
        display: block !important;
        padding: 0;
        margin: 0;
        max-width: none;
      }
      .qr-section-box {
        box-shadow: none;
        border: none;
        padding: 0;
      }
      .qr-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        justify-content: flex-start;
      }
      .qr-card {
        break-inside: avoid;
        page-break-inside: avoid;
        border-color: #cbd5e1 !important;
        background: white !important;
        min-width: 0;
      }
      .qr-card .qr-code-host {
        display: none;
      }
      .qr-card .qr-print-img {
        display: block;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<!-- ── Nav ── -->
<nav>
  <a href="/index.html" class="nav-brand">
    <img src="/LOGO.jpg" alt="KUMON">
    <span>KUMON โพนพิสัย</span>
  </a>
  <div class="nav-right">
    <span class="nav-email" id="userEmail"></span>
    <a href="/index.html" class="nav-link">← หน้าหลัก</a>
    <button type="button" class="nav-logout" id="logoutBtn">ออก</button>
  </div>
</nav>

<!-- ── Page Header ── -->
<div class="page-top">
  <div class="page-top-inner">
    <div>
      <h2>จัดการนักเรียน</h2>
      <p id="studentCount">กำลังโหลด...</p>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-secondary" id="qrAllBtn">📱 สร้าง QR ทั้งหมด</button>
      <button type="button" class="btn-add" id="addBtn">+ เพิ่มนักเรียน</button>
    </div>
  </div>
</div>

<!-- ── Student Grid ── -->
<section class="list-tools" aria-label="ค้นหารายชื่อนักเรียน">
  <div class="search-box">
    <span class="search-icon">🔎</span>
    <input type="search" id="studentSearch" placeholder="ค้นหาชื่อนักเรียน ชื่อเล่น ชั้น หรือวิชา" autocomplete="off">
    <button type="button" class="clear-search" id="clearSearch" title="ล้างคำค้น">✕</button>
  </div>
  <div class="result-count" id="resultCount"></div>
</section>

<section class="subject-filter" aria-label="กรองตามวิชา">
  <button type="button" class="filter-btn active" data-subject="all">ทุกวิชา</button>
  <button type="button" class="filter-btn math" data-subject="math">MATH</button>
  <button type="button" class="filter-btn thai" data-subject="thai">THAI</button>
  <button type="button" class="filter-btn eng" data-subject="eng">ENG</button>
</section>

<div class="container">
  <div class="student-grid" id="studentGrid">
    <div class="state-box">
      <div class="icon">⏳</div>
      <p>กำลังโหลด...</p>
    </div>
  </div>
</div>

<!-- ── Add Student Modal ── -->
<div class="modal-overlay" id="addModal" hidden>
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <h3 id="modal-title">เพิ่มนักเรียน</h3>
        <p id="modal-sub">กรอกข้อมูลและเลือกวิชา</p>
      </div>
      <button type="button" class="btn-close" id="closeAdd">✕</button>
    </div>

    <form id="addForm">
      <div class="form-group">
        <label>ชื่อจริง *</label>
        <input type="text" name="name" placeholder="เช่น สมชาย ใจดี" required>
      </div>
      <div class="form-group">
        <label>ชื่อเล่น</label>
        <input type="text" name="nickname" placeholder="เช่น มิ้น">
      </div>
      <div class="form-group">
        <label>ระดับชั้นปี <span class="form-opt">(ไม่บังคับ)</span></label>
        <select name="grade_level">
          <option value="">เลือกระดับชั้น</option>

<section class="qr-section" id="qrSection" hidden>
  <div class="qr-section-box">

      <div>
        <h3 id="qrTitle">QR Code</h3>
        <p id="qrSub">สร้างจากรายชื่อที่ active อยู่ในฐานข้อมูล</p>
      </div>
      <div class="qr-actions">
        <button type="button" class="btn-print" id="printQR">พิมพ์ QR</button>
        <button type="button" class="btn-hide" id="hideQR">ซ่อน</button>
      </div>
    </div>
    <div class="qr-grid" id="qrGrid"></div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  if (!window.QRCode) {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>')
  }
</script>
<script type="module">
import { logout } from '/js/auth.js'
import { supabase } from '/js/supabase.js'
import { requirePage } from '/js/rbac.js'
import { initBell } from '/js/bell.js'

let students  = []
let editingId = null   // null = add mode, uuid = edit mode
let supportsGradeLevel = true
let searchTerm = ''
let subjectFilter = ''
const subjectIdCache = {}  // { 'MATH': uuid, 'THAI': uuid, 'ENG': uuid }

// ── Init ─────────────────────────────────────────────────────

async function init() {
  const result = await requirePage('admin_panel')
  if (!result) return
  const { session, profile } = result

  initBell(session, profile)
  document.getElementById('userEmail').textContent = session.user.email
  document.getElementById('logoutBtn').addEventListener('click', logout)
  document.getElementById('addBtn').addEventListener('click', openAdd)
  document.getElementById('qrAllBtn').addEventListener('click', openAllQR)
  document.getElementById('closeAdd').addEventListener('click', () => closeModal('addModal'))
  document.getElementById('hideQR').addEventListener('click', hideQR)
  document.getElementById('printQR').addEventListener('click', printQR)
  document.getElementById('addForm').addEventListener('submit', submitForm)

  const searchInput = document.getElementById('studentSearch')
  const clearSearch = document.getElementById('clearSearch')
  searchInput.addEventListener('input', () => {
    searchTerm = searchInput.value.trim().toLowerCase()
    clearSearch.classList.toggle('show', Boolean(searchTerm))
    renderStudents()
  })
  clearSearch.addEventListener('click', () => {
    searchInput.value = ''
    searchTerm = ''
    clearSearch.classList.remove('show')
    searchInput.focus()
    renderStudents()
  })

  document.querySelectorAll('.subject-filter .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      subjectFilter = btn.dataset.subject === 'all' ? '' : btn.dataset.subject
      document.querySelectorAll('.subject-filter .filter-btn').forEach(el => el.classList.toggle('active', el === btn))
      renderStudents()
    })
  })

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.hidden = true })
  })

  await loadStudents()
}

// ── Toast ─────────────────────────────────────────────────────

let toastTimer
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className   = `toast ${type} show`
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500)
}

// ── Load Data ────────────────────────────────────────────────

// หา UUID ของวิชาจากชื่อ — ถ้าไม่มีในตาราง จะสร้างให้อัตโนมัติ
async function resolveSubjectId(name) {
  const key = name.toUpperCase()
  if (subjectIdCache[key]) return subjectIdCache[key]

  const { data } = await supabase
    .from('subjects')
    .select('id')
    .ilike('name', key)
    .maybeSingle()

  if (data?.id) {
    subjectIdCache[key] = data.id
    return data.id
  }

  // สร้างวิชาใหม่ถ้าไม่มี
  const colorMap = { MATH: 'red', THAI: 'green', ENG: 'blue' }
  const { data: created, error } = await supabase
    .from('subjects')
    .insert({ name: key, color: colorMap[key] || 'blue' })
    .select('id')
    .single()

  if (error) { console.error('resolveSubjectId create error:', error); return null }
  subjectIdCache[key] = created.id
  return created.id
}

async function loadStudents() {
  let { data, error } = await supabase
    .from('students')
    .select(`
      id, name, nickname, grade_level, qr_code, created_at,
      student_subjects ( subject_id, subjects ( id, name, color ) )
    `)
    .eq('is_active', true)
    .order('name')

  if (isMissingGradeLevelError(error)) {
    supportsGradeLevel = false
    const fallback = await supabase
      .from('students')
      .select(`
        id, name, nickname, qr_code, created_at,
        student_subjects ( subject_id, subjects ( id, name, color ) )
      `)
      .eq('is_active', true)
      .order('name')
    data = (fallback.data || []).map(student => ({ ...student, grade_level: null }))
    error = fallback.error
  }

  if (error) { toast('โหลดข้อมูลนักเรียนไม่สำเร็จ: ' + error.message, 'err'); return }
  students = data || []
  renderStudents()
}

// ── Helpers ──────────────────────────────────────────────────

function cls(name = '') {
  const n = name.toLowerCase()
  if (n === 'math')      return 'math'
  if (n === 'thai')      return 'thai'
  if (n.includes('eng')) return 'english'
  return 'default'
}

function subjectLabel(name = '') {
  const c = cls(name)
  if (c === 'math')    return 'MATH'
  if (c === 'thai')    return 'THAI'
  if (c === 'english') return 'ENG'
  return name
}

function isMissingGradeLevelError(error) {
  const message = error?.message || error?.details || ''
  return Boolean(error && /grade_level/i.test(message))
}

function normalizeStudentSubjects(subjectRows = []) {
  const seen = new Set()
  return subjectRows
    .map(row => row?.subjects ? { subject_id: row.subject_id, subjects: row.subjects } : null)
    .filter(Boolean)
    .filter(row => {
      const key = row.subject_id || row.subjects.id || row.subjects.name
      if (seen.has(key)) return false
      seen.add(key)
      return true
    })
    .sort((a, b) => {
      const order = { math: 1, thai: 2, english: 3, default: 4 }
      return order[cls(a.subjects.name)] - order[cls(b.subjects.name)]
    })
}

function studentSearchText(student) {
  const subjects = normalizeStudentSubjects(student.student_subjects || [])
    .map(row => subjectLabel(row.subjects.name))
    .join(' ')
  return [
    student.name,
    student.nickname,
    student.grade_level,
    subjects,
  ].filter(Boolean).join(' ').toLowerCase()
}

function filteredStudents() {
  return students.filter(student => {
    if (searchTerm && !studentSearchText(student).includes(searchTerm)) return false
    if (subjectFilter) {
      const subs = normalizeStudentSubjects(student.student_subjects || [])
      if (!subs.some(row => cls(row.subjects.name) === subjectFilter)) return false
    }
    return true
  })
}

function qrDarkColor(name = '') {
  const c = cls(name)
  if (c === 'math')    return '#c2410c'
  if (c === 'thai')    return '#6d28d9'
  if (c === 'english') return '#1d4ed8'
  return '#1a202c'
}

function qrOptions(name = '') {
  return {
    width: 160,
    height: 160,
    text: '',
    margin: 2,
    colorDark: qrDarkColor(name),
    colorLight: '#ffffff',
    correctLevel: window.QRCode?.CorrectLevel?.M ?? 0,
  }
}

function renderQRCode(host, payload, subjectName) {
  if (!window.QRCode) {
    throw new Error('ไม่พบตัวสร้าง QR Code')
  }

  host.innerHTML = ''
  new QRCode(host, {
    ...qrOptions(subjectName),
    text: payload,
  })
}

async function setQRCode(host, payload, subjectName) {
  host.dataset.qrPayload = payload
  host.dataset.qrSubject = subjectName || ''
  renderQRCode(host, payload, subjectName)
  try {
    updatePrintImage(host)
  } catch (err) {
    console.warn('QR print image update failed:', err)
  }
}

function updatePrintImage(host) {
  const targetId = host.dataset.printTarget
  const printImg = targetId ? document.getElementById(targetId) : null
  if (!printImg) return

  const canvas = host.querySelector('canvas')
  if (canvas?.width && canvas?.height) {
    printImg.src = canvas.toDataURL('image/png')
    return
  }

  const img = host.querySelector('img')
  if (img?.src) printImg.src = img.src
}

function prepareQRImagesForPrint() {
  document.querySelectorAll('#qrGrid .qr-code-host[data-print-target]').forEach(host => {
    try {
      updatePrintImage(host)
    } catch (err) {
      console.warn('QR print image update failed:', err)
    }
  })
}

function showQRError(host) {
  const errorEl = document.createElement('div')
  errorEl.className = 'qr-error-text'
  errorEl.textContent = 'สร้าง QR ไม่สำเร็จ'
  host.replaceWith(errorEl)
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;',
  }[ch]))
}

function closeModal(id) { document.getElementById(id).hidden = true }

function setFormBusy(busy) {
  const btn = document.getElementById('addSubmit')
  btn.disabled    = busy
  btn.textContent = busy ? 'กำลังบันทึก...' : 'บันทึก'
}

// ── Render Students ──────────────────────────────────────────

function renderStudents() {
  const grid  = document.getElementById('studentGrid')
  const count = document.getElementById('studentCount')
  const resultCount = document.getElementById('resultCount')
  const visibleStudents = filteredStudents()
  count.textContent = `${students.length} คน`
  const isFiltered = searchTerm || subjectFilter
  resultCount.textContent = isFiltered
    ? `พบ ${visibleStudents.length} จาก ${students.length} คน`
    : `ทั้งหมด ${students.length} คน`

  if (!students.length) {
    grid.innerHTML = `
      <div class="state-box">
        <div class="icon">👨‍🎓</div>
        <p>ยังไม่มีนักเรียน — กด "+ เพิ่มนักเรียน" เพื่อเริ่ม</p>
      </div>`
    return
  }

  if (!visibleStudents.length) {
    grid.innerHTML = `
      <div class="state-box">
        <div class="icon">🔎</div>
        <p>ไม่พบนักเรียนที่ตรงกับคำค้น</p>
      </div>`
    return
  }

  grid.innerHTML = visibleStudents.map(s => {
    const subs    = normalizeStudentSubjects(s.student_subjects || [])
    const displayName = s.name || '-'
    const displayNick = s.nickname || ''
    const initial = (displayNick || displayName).charAt(0).toUpperCase()
    const badges  = subs.length
      ? subs.map(ss =>
          `<span class="badge badge-${cls(ss.subjects.name)}">${escapeHtml(subjectLabel(ss.subjects.name))}</span>`
        ).join('')
      : `<span class="no-sub">ยังไม่มีวิชา</span>`
    const gradeTag = s.grade_level
      ? `<span class="badge badge-default" style="font-size:.7rem">${escapeHtml(s.grade_level)}</span>`
      : ''

    return `
      <div class="student-card">
        <div class="card-top">
          <div class="avatar">${initial}</div>
          <div class="card-info">
            <div class="card-name">${escapeHtml(displayName)}</div>
            ${displayNick ? `<div class="card-nick">(${escapeHtml(displayNick)})</div>` : ''}
          </div>
          <div class="card-actions">
            <button class="btn-qr"          onclick="openQR('${s.id}')">📱 QR</button>
            <button class="btn-icon edit"   onclick="openEdit('${s.id}')" title="แก้ไข">✏️</button>
            <button class="btn-del"         onclick="doDelete('${s.id}')">🗑️</button>
          </div>
        </div>
        <div class="card-subjects">${badges}${gradeTag}</div>
      </div>`
  }).join('')
}

// ── Subject Select ───────────────────────────────────────────

// ตั้งค่า select ด้วยชื่อวิชา (MATH / THAI / ENG)
function setSubjectTo(name = '') {
  document.getElementById('subjectSelect').value = subjectLabel(name)
}

// ── Open Add Modal ───────────────────────────────────────────

function openAdd() {
  editingId = null
  document.getElementById('addForm').reset()
  setSubjectTo()
  document.getElementById('addError').style.display   = 'none'
  document.getElementById('modal-title').textContent  = 'เพิ่มนักเรียน'
  document.getElementById('modal-sub').textContent    = 'กรอกข้อมูลและเลือกวิชา'
  document.getElementById('addSubmit').textContent    = 'บันทึก'
  document.getElementById('addModal').hidden          = false
}

// ── Open Edit Modal ──────────────────────────────────────────

window.openEdit = (studentId) => {
  const s = students.find(x => x.id === studentId)
  if (!s) return

  editingId = studentId

  const form = document.getElementById('addForm')
  form.reset()

  // ใช้ elements[] แทน form.name เพื่อหลีกเลี่ยง property ชนกัน
  form.elements['name'].value         = s.name        || ''
  form.elements['nickname'].value     = s.nickname    || ''
  form.elements['grade_level'].value  = s.grade_level || ''

  const enrolledSubject = (s.student_subjects || [])[0]?.subjects
  setSubjectTo(enrolledSubject?.name || '')

  document.getElementById('addError').style.display  = 'none'
  document.getElementById('modal-title').textContent = 'แก้ไขข้อมูลนักเรียน'
  document.getElementById('modal-sub').textContent   = s.name
  document.getElementById('addSubmit').textContent   = 'บันทึกการแก้ไข'
  document.getElementById('addModal').hidden         = false
}

// ── Submit (Add or Edit) ─────────────────────────────────────

async function submitForm(e) {
  e.preventDefault()
  const errEl = document.getElementById('addError')
  errEl.style.display = 'none'
  setFormBusy(true)

  // ใช้ FormData — หลีกเลี่ยง e.target.name ที่ชนกับ form property
  const fd            = new FormData(e.target)
  const name          = (fd.get('name')         || '').trim()
  const nickname      = (fd.get('nickname')     || '').trim()
  const grade_level   = (fd.get('grade_level')  || '').trim()
  const subjectName   = (fd.get('subject_id')   || '').trim()  // 'MATH' | 'THAI' | 'ENG'

  if (!name) {
    errEl.textContent   = 'กรุณาใส่ชื่อจริง'
    errEl.style.display = 'block'
    setFormBusy(false)
    return
  }

  if (!subjectName) {
    errEl.textContent   = 'กรุณาเลือกวิชา'
    errEl.style.display = 'block'
    setFormBusy(false)
    return
  }

  const subjectId = await resolveSubjectId(subjectName)
  if (!subjectId) {
    errEl.textContent   = 'บันทึกวิชาไม่สำเร็จ — กรุณาตรวจสอบการเชื่อมต่อ'
    errEl.style.display = 'block'
    setFormBusy(false)
    return
  }

  const selected = [subjectId]

  if (editingId) {
    await doUpdate(editingId, { name, nickname, grade_level, selected })
  } else {
    await doCreate({ name, nickname, grade_level, selected })
  }
}

// ── Create Student ───────────────────────────────────────────

async function doCreate({ name, nickname, grade_level, selected }) {
  const errEl = document.getElementById('addError')
  const studentPayload = {
    name,
    nickname: nickname || null,
    qr_code:  crypto.randomUUID(),
  }
  if (supportsGradeLevel) studentPayload.grade_level = grade_level || null

  let { data: student, error } = await supabase
    .from('students')
    .insert(studentPayload)
    .select('id')
    .single()

  if (isMissingGradeLevelError(error)) {
    supportsGradeLevel = false
    delete studentPayload.grade_level
    const fallback = await supabase
      .from('students')
      .insert(studentPayload)
      .select('id')
      .single()
    student = fallback.data
    error = fallback.error
  }

  if (error) {
    errEl.textContent   = 'บันทึกไม่สำเร็จ: ' + error.message
    errEl.style.display = 'block'
    setFormBusy(false)
    return
  }

  if (selected.length) {
    const { error: subErr } = await supabase
      .from('student_subjects')
      .insert(selected.map(sid => ({ student_id: student.id, subject_id: sid })))

    if (subErr) {
      errEl.textContent   = 'บันทึกวิชาไม่สำเร็จ: ' + subErr.message
      errEl.style.display = 'block'
      setFormBusy(false)
      return
    }
  }

  setFormBusy(false)
  closeModal('addModal')
  toast(`เพิ่ม "${name}" สำเร็จแล้ว ✓`)
  await loadStudents()
}

// ── Update Student ───────────────────────────────────────────

async function doUpdate(id, { name, nickname, grade_level, selected }) {
  const errEl = document.getElementById('addError')
  const studentPayload = {
    name,
    nickname: nickname || null,
  }
  if (supportsGradeLevel) studentPayload.grade_level = grade_level || null

  let { error } = await supabase
    .from('students')
    .update(studentPayload)
    .eq('id', id)

  if (isMissingGradeLevelError(error)) {
    supportsGradeLevel = false
    delete studentPayload.grade_level
    const fallback = await supabase
      .from('students')
      .update(studentPayload)
      .eq('id', id)
    error = fallback.error
  }

  if (error) {
    errEl.textContent   = 'แก้ไขไม่สำเร็จ: ' + error.message
    errEl.style.display = 'block'
    setFormBusy(false)
    return
  }

  // อัปเดต subjects: ลบเก่าทั้งหมด แล้ว insert ใหม่
  await supabase.from('student_subjects').delete().eq('student_id', id)

  if (selected.length) {
    const { error: subErr } = await supabase
      .from('student_subjects')
      .insert(selected.map(sid => ({ student_id: id, subject_id: sid })))

    if (subErr) {
      errEl.textContent   = 'แก้ไขวิชาไม่สำเร็จ: ' + subErr.message
      errEl.style.display = 'block'
      setFormBusy(false)
      return
    }
  }

  setFormBusy(false)
  closeModal('addModal')
  toast(`แก้ไข "${name}" สำเร็จแล้ว ✓`)
  await loadStudents()
}

// ── QR Section ────────────────────────────────────────────────

window.openQR = async (studentId) => {
  const s = students.find(x => x.id === studentId)
  if (!s) return

  document.getElementById('qrTitle').textContent = s.name
  document.getElementById('qrSub').textContent   = [s.nickname ? `ชื่อเล่น: ${s.nickname}` : '', s.grade_level || '']
    .filter(Boolean).join(' · ')

  const subs = normalizeStudentSubjects(s.student_subjects || [])
  const grid = document.getElementById('qrGrid')

  if (!subs.length) {
    grid.innerHTML = `<p style="color:#94a3b8;padding:28px;text-align:center;width:100%">
      ยังไม่มีวิชาที่ลงทะเบียน<br><small>กด ✏️ เพื่อเพิ่มวิชา</small></p>`
    showQRSection()
    return
  }

  grid.innerHTML = subs.map(ss => {
    const c = cls(ss.subjects.name)
    const qrId = `qr-${ss.subjects.id}`
    const printId = `qr-print-${ss.subjects.id}`
    return `
      <div class="qr-card ${c}">
        <div class="qr-code-host" id="${qrId}" data-print-target="${printId}" aria-label="QR ${escapeHtml(subjectLabel(ss.subjects.name))} ${escapeHtml(s.name)}"></div>
        <img class="qr-print-img" id="${printId}" alt="QR ${escapeHtml(subjectLabel(ss.subjects.name))} ${escapeHtml(s.name)}">
        <div class="qr-sub">${escapeHtml(subjectLabel(ss.subjects.name))}</div>
        <div class="qr-name">${escapeHtml(s.nickname || s.name)}</div>
        ${s.grade_level ? `<div class="qr-name">${escapeHtml(s.grade_level)}</div>` : ''}
      </div>`
  }).join('')

  showQRSection()

  for (const ss of subs) {
    const host = document.getElementById(`qr-${ss.subjects.id}`)
    if (!host) continue
    try {
      await setQRCode(host, `${s.qr_code}:${ss.subjects.id}`, ss.subjects.name)
    } catch (err) {
      console.error('QR render failed:', err)
      showQRError(host)
    }
  }
}

async function openAllQR() {
  if (!students.length) await loadStudents()

  const entries = []
  filteredStudents().forEach(s => {
    const enrolledSubjects = normalizeStudentSubjects(s.student_subjects || [])
    enrolledSubjects.forEach(ss => {
      if (!ss.subjects) return
      entries.push({ student: s, subject: ss.subjects })
    })
  })

  const title = document.getElementById('qrTitle')
  const grid = document.getElementById('qrGrid')
  const sub = document.getElementById('qrSub')
  title.textContent = 'QR Code นักเรียนทั้งหมด'

  if (!entries.length) {
    sub.textContent = 'ยังไม่มีนักเรียนที่มีวิชาสำหรับสร้าง QR'
    grid.innerHTML = `<p style="color:#94a3b8;padding:28px;text-align:center;width:100%">
      เพิ่มรายชื่อนักเรียนและเลือกวิชาก่อนสร้าง QR Code</p>`
    showQRSection()
    return
  }

  sub.textContent = searchTerm
    ? `ผลค้นหา ${filteredStudents().length} จาก ${students.length} คน · ${entries.length} QR Code`
    : `${students.length} คน · ${entries.length} QR Code`
  grid.innerHTML = entries.map((entry, index) => {
    const c = cls(entry.subject.name)
    const qrId = `qr-all-${index}`
    const printId = `qr-print-all-${index}`
    return `
      <div class="qr-card ${c}">
        <div class="qr-code-host" id="${qrId}" data-print-target="${printId}" aria-label="QR ${escapeHtml(subjectLabel(entry.subject.name))} ${escapeHtml(entry.student.name)}"></div>
        <img class="qr-print-img" id="${printId}" alt="QR ${escapeHtml(subjectLabel(entry.subject.name))} ${escapeHtml(entry.student.name)}">
        <div class="qr-sub">${escapeHtml(subjectLabel(entry.subject.name))}</div>
        <div class="qr-name">${escapeHtml(entry.student.nickname || entry.student.name)}</div>
        ${entry.student.grade_level ? `<div class="qr-name">${escapeHtml(entry.student.grade_level)}</div>` : ''}
      </div>`
  }).join('')

  showQRSection()

  for (const [index, entry] of entries.entries()) {
    const host = document.getElementById(`qr-all-${index}`)
    if (!host) continue
    try {
      await setQRCode(host, `${entry.student.qr_code}:${entry.subject.id}`, entry.subject.name)
    } catch (err) {
      console.error('QR render failed:', err)
      showQRError(host)
    }
  }
}

function showQRSection() {
  const section = document.getElementById('qrSection')
  section.hidden = false
  section.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

function hideQR() {
  document.getElementById('qrSection').hidden = true
}

function printQR() {
  const section = document.getElementById('qrSection')
  const hasQR = section && !section.hidden && document.querySelector('#qrGrid .qr-code-host')
  if (!hasQR) {
    toast('กรุณาสร้าง QR ก่อนพิมพ์', 'err')
    return
  }
  prepareQRImagesForPrint()
  window.print()
}

// ── Delete ───────────────────────────────────────────────────

window.doDelete = async (id) => {
  const student = students.find(x => x.id === id)
  const name = student?.name || 'นักเรียน'
  if (!confirm(`ลบ "${name}" ออกจากระบบ?\n(ประวัติการเข้าเรียนจะยังคงอยู่)`)) return
  const { error } = await supabase.from('students').update({ is_active: false }).eq('id', id)
  if (error) { toast('ลบไม่สำเร็จ: ' + error.message, 'err'); return }
  toast(`ลบ "${name}" แล้ว`)
  await loadStudents()
}

init()
</script>
