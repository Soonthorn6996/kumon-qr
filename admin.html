<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUMON โพนพิสัย — จัดการนักเรียน</title>
  <style>
    :root {
      --bg:      #eaf4fb;
      --navy:    #1a4a6e;
      --primary: #f97316;
      --pri-h:   #ea6c0a;
      --gold:    #c9a227;
      --blue:    #5ba4cf;
      --text:    #1a202c;
      --muted:   #5a7a92;
      --border:  #c5e3f2;
      --card:    #ffffff;

      /* Subject palette from infinity logo */
      --math-bg: #fff7ed; --math-fg: #c2410c; --math-bd: #fdba74;
      --thai-bg: #f5f3ff; --thai-fg: #6d28d9; --thai-bd: #c4b5fd;
      --eng-bg:  #eff6ff; --eng-fg:  #1d4ed8; --eng-bd:  #93c5fd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      background: var(--navy);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-brand img {
      width: 36px; height: 36px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--gold);
    }

    .nav-brand span { font-weight: 700; font-size: 1rem; color: #fff; letter-spacing: .3px; }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-email {
      font-size: .78rem; color: #a0c4dd;
      max-width: 150px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .nav-link {
      color: #a0c4dd; font-size: .8rem; text-decoration: none;
      padding: 5px 11px; border: 1px solid #3a6a90; border-radius: 6px;
    }
    .nav-link:hover { background: #3a6a90; color: #fff; }

    .nav-logout {
      background: transparent; border: 1px solid #3a6a90; color: #a0c4dd;
      padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: .8rem;
    }
    .nav-logout:hover { background: #3a6a90; color: #fff; }

    /* ── Page Header ─────────────────────────────────── */
    .page-top {
      background: linear-gradient(135deg, var(--navy) 0%, #2a6496 100%);
      padding: 22px 20px;
      color: white;
    }

    .page-top-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .page-top h2 { font-size: 1.2rem; font-weight: 700; }
    .page-top p  { color: #a0c4dd; font-size: .82rem; margin-top: 3px; }

    .btn-add {
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white; border: none;
      padding: 10px 20px; border-radius: 10px;
      font-size: .9rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(249,115,22,.35);
      transition: opacity .2s, transform .1s;
    }
    .btn-add:hover  { opacity: .9; }
    .btn-add:active { transform: scale(.97); }

    /* ── Student Grid ────────────────────────────────── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── Student Card ────────────────────────────────── */
    .student-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 10px rgba(26,74,110,.07);
      border-left: 4px solid var(--gold);
      transition: transform .15s, box-shadow .15s;
    }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,74,110,.12); }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }

    .avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #ec4899, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(249,115,22,.3);
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; color: var(--navy); font-size: .97rem; }
    .card-nick { color: var(--muted); font-size: .8rem; margin-top: 2px; }

    .card-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: -2px; }

    .btn-qr {
      display: flex; align-items: center; gap: 5px;
      background: #eff6ff; border: 1px solid var(--eng-bd); color: #1d4ed8;
      padding: 5px 10px; border-radius: 7px; cursor: pointer; font-size: .78rem; font-weight: 600;
    }
    .btn-qr:hover { background: #dbeafe; }

    .btn-del {
      background: none; border: none; cursor: pointer;
      padding: 5px 8px; border-radius: 7px; font-size: .85rem; color: #94a3b8;
    }
    .btn-del:hover { background: #fff5f5; color: #e53e3e; }

    .card-subjects { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }

    .badge {
      padding: 3px 11px; border-radius: 20px;
      font-size: .73rem; font-weight: 700; letter-spacing: .2px;
    }
    .badge-math    { background: var(--math-bg); color: var(--math-fg); border: 1px solid var(--math-bd); }
    .badge-thai    { background: var(--thai-bg); color: var(--thai-fg); border: 1px solid var(--thai-bd); }
    .badge-english { background: var(--eng-bg);  color: var(--eng-fg);  border: 1px solid var(--eng-bd);  }
    .badge-default { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }

    .no-sub { color: #94a3b8; font-size: .78rem; }

    /* ── States ─────────────────────────────────────── */
    .state-box {
      grid-column: 1/-1; text-align: center;
      padding: 64px 20px; color: #94a3b8;
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 10px; }
    .state-box p { font-size: .95rem; }

    /* ── Modal Overlay ───────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,35,55,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }

    .modal-box {
      background: white; border-radius: 18px; padding: 26px 24px;
      width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
    }

    .modal-box.wide { max-width: 740px; }

    .modal-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 22px;
    }

    .modal-head h3 { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .modal-head p  { font-size: .8rem; color: var(--muted); margin-top: 3px; }

    .btn-close {
      background: #f1f5f9; border: none; width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      color: var(--muted); flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
    }
    .btn-close:hover { background: #e2e8f0; }

    /* ── Add Form ────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block; font-size: .82rem;
      font-weight: 600; color: var(--navy); margin-bottom: 6px;
    }

    .form-group input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .95rem; color: var(--text); background: #f5fbff;
      transition: border-color .2s, box-shadow .2s;
    }

    .form-group input:focus {
      outline: none; border-color: var(--blue); background: #fff;
      box-shadow: 0 0 0 3px rgba(91,164,207,.2);
    }

    /* Subject toggle pills */
    .subject-picks { display: flex; gap: 8px; flex-wrap: wrap; }

    .pick-item {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; user-select: none; font-size: .85rem; font-weight: 600;
      color: var(--muted); transition: all .15s;
    }
    .pick-item input[type=checkbox] { width: 15px; height: 15px; flex-shrink: 0; }

    .pick-item.on-math    { border-color: var(--math-bd); background: var(--math-bg); color: var(--math-fg); }
    .pick-item.on-thai    { border-color: var(--thai-bd); background: var(--thai-bg); color: var(--thai-fg); }
    .pick-item.on-english { border-color: var(--eng-bd);  background: var(--eng-bg);  color: var(--eng-fg);  }

    .form-error {
      background: #fff7ed; border: 1px solid var(--math-bd); color: var(--math-fg);
      border-radius: 10px; padding: 10px 14px; font-size: .875rem;
      margin-bottom: 12px; display: none;
    }

    .btn-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 12px rgba(249,115,22,.3); margin-top: 4px;
      transition: opacity .2s;
    }
    .btn-submit:hover    { opacity: .9; }
    .btn-submit:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    /* ── QR Grid ─────────────────────────────────────── */
    .qr-grid {
      display: flex; flex-wrap: wrap;
      gap: 16px; justify-content: center; padding: 4px 0;
    }

    .qr-card {
      background: #f8fafc; border-radius: 14px;
      padding: 20px 16px; text-align: center;
      border: 2px solid var(--border); min-width: 170px;
    }

    .qr-card canvas { border-radius: 6px; display: block; margin: 0 auto; }

    .qr-sub  { font-weight: 700; font-size: .95rem; margin-top: 10px; }
    .qr-name { color: var(--muted); font-size: .78rem; margin-top: 3px; }

    .qr-card.math    { border-color: var(--math-bd); }
    .qr-card.math    .qr-sub { color: var(--math-fg); }
    .qr-card.thai    { border-color: var(--thai-bd); }
    .qr-card.thai    .qr-sub { color: var(--thai-fg); }
    .qr-card.english { border-color: var(--eng-bd); }
    .qr-card.english .qr-sub { color: var(--eng-fg); }

    .qr-footer { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

    .btn-print {
      background: var(--navy); color: white; border: none;
      padding: 11px 30px; border-radius: 10px;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 12px rgba(26,74,110,.25);
    }
    .btn-print:hover { background: #2a6496; }

    /* ── Mobile Responsive ───────────────────────────── */
    @media (max-width: 640px) {
      .nav-email { display: none; }
      .nav-link  { display: none; }

      .page-top-inner { flex-wrap: wrap; gap: 10px; }
      .page-top h2 { font-size: 1.05rem; }

      .student-grid { grid-template-columns: 1fr; }

      /* Bottom sheet modal on mobile */
      .modal-overlay {
        align-items: flex-end;
        padding: 0;
      }
      .modal-box {
        border-radius: 20px 20px 0 0;
        max-height: 92vh;
        padding: 22px 18px;
      }
      .modal-box.wide { max-width: 100%; }

      .qr-grid { gap: 12px; }
      .qr-card { min-width: 140px; padding: 14px 12px; }

      .subject-picks { gap: 6px; }
      .pick-item { padding: 7px 11px; font-size: .8rem; }
    }

    @media (min-width: 641px) and (max-width: 900px) {
      .student-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Print ───────────────────────────────────────── */
    @media print {
      body > *:not(#qrModal) { display: none !important; }
      #qrModal { position: static !important; background: none !important; padding: 0 !important; }
      .modal-box { box-shadow: none !important; padding: 16px !important; border-radius: 0 !important; max-height: none !important; }
      .modal-head .btn-close, .qr-footer .btn-print { display: none !important; }
      .qr-grid { justify-content: flex-start; }
    }
  </style>
</head>
<body>

<!-- ── Nav ── -->
<nav>
  <a href="/index.html" class="nav-brand">
    <img src="/LOGO.jpg" alt="KUMON">
    <span>KUMON โพนพิสัย</span>
  </a>
  <div class="nav-right">
    <span class="nav-email" id="userEmail"></span>
    <a href="/index.html" class="nav-link">← หน้าหลัก</a>
    <button class="nav-logout" id="logoutBtn">ออก</button>
  </div>
</nav>

<!-- ── Page Header ── -->
<div class="page-top">
  <div class="page-top-inner">
    <div>
      <h2>จัดการนักเรียน</h2>
      <p id="studentCount">กำลังโหลด...</p>
    </div>
    <button class="btn-add" id="addBtn">+ เพิ่มนักเรียน</button>
  </div>
</div>

<!-- ── Student Grid ── -->
<div class="container">
  <div class="student-grid" id="studentGrid">
    <div class="state-box">
      <div class="icon">⏳</div>
      <p>กำลังโหลด...</p>
    </div>
  </div>
</div>

<!-- ── Add Student Modal ── -->
<div class="modal-overlay" id="addModal" hidden>
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <h3>เพิ่มนักเรียน</h3>
        <p>กรอกข้อมูลและเลือกวิชา</p>
      </div>
      <button class="btn-close" id="closeAdd">✕</button>
    </div>

    <form id="addForm">
      <div class="form-group">
        <label>ชื่อจริง *</label>
        <input type="text" name="name" placeholder="เช่น สมชาย ใจดี" required>
      </div>
      <div class="form-group">
        <label>ชื่อเล่น</label>
        <input type="text" name="nickname" placeholder="เช่น มิ้น">
      </div>
      <div class="form-group">
        <label>วิชาที่ลงทะเบียน</label>
        <div class="subject-picks" id="subjectPicks"></div>
      </div>
      <div class="form-error" id="addError"></div>
      <button type="submit" class="btn-submit" id="addSubmit">บันทึก</button>
    </form>
  </div>
</div>

<!-- ── QR Code Modal ── -->
<div class="modal-overlay" id="qrModal" hidden>
  <div class="modal-box wide">
    <div class="modal-head">
      <div>
        <h3 id="qrTitle">QR Code</h3>
        <p id="qrSub"></p>
      </div>
      <button class="btn-close" id="closeQR">✕</button>
    </div>
    <div class="qr-grid" id="qrGrid"></div>
    <div class="qr-footer">
      <button class="btn-print" onclick="window.print()">🖨️ พิมพ์ QR Code</button>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script type="module">
import { requireAuth, logout } from '/js/auth.js'
import { supabase } from '/js/supabase.js'

let subjects = []
let students = []

// ── Init ─────────────────────────────────────────────────────

async function init() {
  const session = await requireAuth()
  document.getElementById('userEmail').textContent = session.user.email
  document.getElementById('logoutBtn').addEventListener('click', logout)
  document.getElementById('addBtn').addEventListener('click', openAdd)
  document.getElementById('closeAdd').addEventListener('click', () => closeModal('addModal'))
  document.getElementById('closeQR').addEventListener('click', () => closeModal('qrModal'))
  document.getElementById('addForm').addEventListener('submit', submitAdd)

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.hidden = true })
  })

  await loadSubjects()
  buildSubjectPicks()
  await loadStudents()
}

// ── Data ─────────────────────────────────────────────────────

async function loadSubjects() {
  const { data } = await supabase.from('subjects').select('*').order('name')
  subjects = data || []
}

async function loadStudents() {
  const { data } = await supabase
    .from('students')
    .select('*, student_subjects(subject_id, subjects(id, name, color))')
    .eq('is_active', true)
    .order('name')
  students = data || []
  renderStudents()
}

// ── Helpers ──────────────────────────────────────────────────

function cls(name = '') {
  const n = name.toLowerCase()
  if (n === 'math')      return 'math'
  if (n === 'thai')      return 'thai'
  if (n.includes('eng')) return 'english'
  return 'default'
}

function closeModal(id) { document.getElementById(id).hidden = true }

// ── Render ───────────────────────────────────────────────────

function renderStudents() {
  const grid  = document.getElementById('studentGrid')
  const count = document.getElementById('studentCount')
  count.textContent = `${students.length} คน`

  if (!students.length) {
    grid.innerHTML = `
      <div class="state-box">
        <div class="icon">👨‍🎓</div>
        <p>ยังไม่มีนักเรียน — กด "+ เพิ่มนักเรียน" เพื่อเริ่ม</p>
      </div>`
    return
  }

  grid.innerHTML = students.map(s => {
    const subs    = s.student_subjects || []
    const initial = (s.nickname || s.name).charAt(0).toUpperCase()
    const badges  = subs.length
      ? subs.map(ss =>
          `<span class="badge badge-${cls(ss.subjects.name)}">${ss.subjects.name}</span>`
        ).join('')
      : `<span class="no-sub">ยังไม่มีวิชา</span>`

    return `
      <div class="student-card">
        <div class="card-top">
          <div class="avatar">${initial}</div>
          <div class="card-info">
            <div class="card-name">${s.name}</div>
            ${s.nickname ? `<div class="card-nick">(${s.nickname})</div>` : ''}
          </div>
          <div class="card-actions">
            <button class="btn-qr" onclick="openQR('${s.id}')">📱 QR</button>
            <button class="btn-del" onclick="doDelete('${s.id}','${s.name.replace(/'/g,"\\'")}')">🗑️</button>
          </div>
        </div>
        <div class="card-subjects">${badges}</div>
      </div>`
  }).join('')
}

// ── Add Form ─────────────────────────────────────────────────

function buildSubjectPicks() {
  document.getElementById('subjectPicks').innerHTML = subjects.map(s => {
    const c = cls(s.name)
    return `
      <label class="pick-item" id="pick-${s.id}">
        <input type="checkbox" name="subjects" value="${s.id}"
          onchange="togglePick('${s.id}','${c}')">
        <span>${s.name}</span>
      </label>`
  }).join('')
}

window.togglePick = (id, c) => {
  const label = document.getElementById(`pick-${id}`)
  label.className = `pick-item${label.querySelector('input').checked ? ` on-${c}` : ''}`
}

function openAdd() {
  document.getElementById('addForm').reset()
  document.querySelectorAll('.pick-item').forEach(el => el.className = 'pick-item')
  document.getElementById('addError').style.display = 'none'
  document.getElementById('addModal').hidden = false
}

async function submitAdd(e) {
  e.preventDefault()
  const btn   = document.getElementById('addSubmit')
  const errEl = document.getElementById('addError')
  errEl.style.display = 'none'

  const name     = e.target.name.value.trim()
  const nickname = e.target.nickname.value.trim()
  const selected = [...e.target.querySelectorAll('input[name=subjects]:checked')].map(c => c.value)

  btn.disabled    = true
  btn.textContent = 'กำลังบันทึก...'

  const { data: student, error } = await supabase
    .from('students')
    .insert({ name, nickname: nickname || null, qr_code: crypto.randomUUID() })
    .select()
    .single()

  if (error) {
    errEl.textContent    = 'เกิดข้อผิดพลาด: ' + error.message
    errEl.style.display  = 'block'
    btn.disabled         = false
    btn.textContent      = 'บันทึก'
    return
  }

  if (selected.length) {
    await supabase.from('student_subjects').insert(
      selected.map(sid => ({ student_id: student.id, subject_id: sid }))
    )
  }

  btn.disabled    = false
  btn.textContent = 'บันทึก'
  closeModal('addModal')
  await loadStudents()
}

// ── QR Modal ─────────────────────────────────────────────────

window.openQR = async (studentId) => {
  const s = students.find(x => x.id === studentId)
  if (!s) return

  document.getElementById('qrTitle').textContent = s.name
  document.getElementById('qrSub').textContent   = s.nickname ? `ชื่อเล่น: ${s.nickname}` : ''

  const subs = s.student_subjects || []
  const grid = document.getElementById('qrGrid')

  if (!subs.length) {
    grid.innerHTML = '<p style="color:#94a3b8;padding:28px;text-align:center;width:100%">ยังไม่มีวิชาที่ลงทะเบียน</p>'
    document.getElementById('qrModal').hidden = false
    return
  }

  grid.innerHTML = subs.map(ss => {
    const c = cls(ss.subjects.name)
    return `
      <div class="qr-card ${c}">
        <canvas id="qr-${ss.subjects.id}"></canvas>
        <div class="qr-sub">${ss.subjects.name}</div>
        <div class="qr-name">${s.nickname || s.name}</div>
      </div>`
  }).join('')

  document.getElementById('qrModal').hidden = false

  for (const ss of subs) {
    const canvas = document.getElementById(`qr-${ss.subjects.id}`)
    if (!canvas) continue
    await QRCode.toCanvas(canvas, `${s.qr_code}:${ss.subjects.id}`, {
      width: 160, margin: 2,
      color: { dark: '#1a202c', light: '#f8fafc' }
    })
  }
}

// ── Delete ───────────────────────────────────────────────────

window.doDelete = async (id, name) => {
  if (!confirm(`ลบ "${name}" ออกจากระบบ?\n(ประวัติการเข้าเรียนจะยังคงอยู่)`)) return
  await supabase.from('students').update({ is_active: false }).eq('id', id)
  await loadStudents()
}

init()
</script>
