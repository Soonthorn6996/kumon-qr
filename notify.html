<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUMON — การแจ้งเตือน</title>
  <style>
    :root {
      --bg: #eaf4fb; --navy: #1a4a6e; --primary: #f97316;
      --gold: #c9a227; --blue: #5ba4cf; --text: #1a202c;
      --muted: #5a7a92; --border: #c5e3f2; --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); min-height: 100vh; }

    nav {
      background: var(--navy); padding: 0 20px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
    .nav-brand span { font-weight: 700; font-size: 1rem; color: white; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-back {
      background: transparent; border: 1px solid #3a6a90; color: #a0c4dd;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: .8rem; text-decoration: none; white-space: nowrap;
    }
    .nav-back:hover { background: #3a6a90; color: white; }

    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #2a6496 100%);
      color: white; padding: 28px 20px; text-align: center;
    }
    .hero h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; }
    .hero p { color: #a0c4dd; font-size: .88rem; }

    .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }

    /* ── Permission card ── */
    .perm-card {
      background: var(--card); border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 2px 10px rgba(26,74,110,.08); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .perm-card p { font-size: .85rem; color: var(--muted); }
    .perm-card strong { display: block; font-size: .93rem; color: var(--text); margin-bottom: 3px; }
    .btn-enable {
      background: var(--primary); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: .85rem; font-weight: 600; white-space: nowrap;
    }
    .btn-enable:disabled { background: #10b981; cursor: default; }

    /* ── User selector card ── */
    .user-card {
      background: var(--card); border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 2px 10px rgba(26,74,110,.08); margin-bottom: 16px;
    }
    .user-card label {
      display: block; font-size: .8rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .user-select-row { display: flex; align-items: center; gap: 10px; }
    .user-select-row select {
      flex: 1; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .9rem; color: var(--text); background: white;
    }
    .role-badge {
      display: inline-block; font-size: .72rem; font-weight: 700;
      padding: 3px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-admin   { background: #dbeafe; color: #1d4ed8; }
    .badge-teacher { background: #dcfce7; color: #15803d; }
    .badge-view    { background: #f3f4f6; color: #6b7280; }

    /* ── Student list ── */
    .section-title {
      font-size: .8rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
    }
    .student-list { display: flex; flex-direction: column; gap: 8px; }

    .student-row {
      background: var(--card); border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 1px 6px rgba(26,74,110,.07);
    }
    .student-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border); flex-shrink: 0;
    }
    .avatar-placeholder {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem; flex-shrink: 0;
    }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-size: .95rem; font-weight: 600; color: var(--text); }
    .student-nick { font-size: .8rem; color: var(--muted); }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .toggle-label { font-size: .8rem; color: var(--muted); min-width: 52px; text-align: right; }
    .toggle { position: relative; width: 44px; height: 24px; display: inline-block; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #cbd5e0;
      border-radius: 24px; cursor: pointer; transition: .2s;
    }
    .slider::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .slider { background: var(--primary); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    #statusMsg { text-align: center; padding: 16px; font-size: .85rem; color: var(--muted); }
  </style>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

<nav>
  <a href="/index.html" class="nav-brand">
    <img src="/LOGO.jpg" alt="KUMON">
    <span>KUMON โพนพิสัย</span>
  </a>
  <div class="nav-right">
    <a href="/index.html" class="nav-back">← กลับ</a>
  </div>
</nav>

<div class="hero">
  <h2 data-i18n="notify_title">🔔 การแจ้งเตือน</h2>
  <p data-i18n="notify_sub">ตั้งค่านักเรียนที่แจ้งเตือนสำหรับแต่ละบัญชีผู้ใช้</p>
</div>

<div class="container">

  <!-- Permission -->
  <div class="perm-card">
    <div>
      <strong id="permTitle" data-i18n="notify_perm_title">การแจ้งเตือนของ Chrome</strong>
      <p id="permDesc" data-i18n="notify_perm_desc">กดเปิดเพื่อรับแจ้งเตือนเมื่อนักเรียนสแกน QR</p>
    </div>
    <button class="btn-enable" id="permBtn" data-i18n="notify_perm_btn">เปิดการแจ้งเตือน</button>
  </div>

  <!-- User selector -->
  <div class="user-card">
    <label data-i18n="notify_user_label">ตั้งค่าสำหรับบัญชีผู้ใช้</label>
    <div class="user-select-row">
      <select id="userSelect"></select>
      <span class="role-badge" id="selectedRoleBadge"></span>
    </div>
  </div>

  <!-- Student list -->
  <div class="section-title" data-i18n="notify_students_title">นักเรียนที่ติดตาม</div>
  <div id="statusMsg">กำลังโหลด...</div>
  <div class="student-list" id="studentList"></div>

</div>

<script src="/js/config.js"></script>
<script type="module">
  import { requirePage } from '/js/rbac.js'
  import { supabase }    from '/js/supabase.js'
  import { applyI18n, t } from '/js/i18n.js'
  import {
    requestPermission, getPermission, registerSW
  } from '/js/notifications.js'

  applyI18n()

  const ROLE_LABELS = { admin: 'ผู้ดูแลระบบ', teacher: 'ครูผู้ช่วย', view: 'ดูอย่างเดียว' }
  const ROLE_BADGE  = { admin: 'badge-admin', teacher: 'badge-teacher', view: 'badge-view' }

  let currentUserId = ''
  let selectedUserId = ''
  let allStudents = []
  let watchedIds = []

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    const result = await requirePage('notify')
    if (!result) return
    const { session } = result
    currentUserId  = session.user.id
    selectedUserId = session.user.id

    await registerSW()
    updatePermUI()
    document.getElementById('permBtn').addEventListener('click', onPermClick)

    await Promise.all([loadUsers(), loadStudents()])
    await reloadWatches()
    renderStudents()
  }

  // ── Permission ────────────────────────────────────────────────
  function updatePermUI() {
    const p    = getPermission()
    const btn  = document.getElementById('permBtn')
    const desc = document.getElementById('permDesc')
    if (p === 'granted') {
      btn.textContent = t('notify_perm_on'); btn.disabled = true
      desc.textContent = t('notify_perm_on_desc')
    } else if (p === 'denied') {
      btn.textContent = t('notify_perm_blocked'); btn.disabled = true
      desc.textContent = t('notify_perm_blocked_desc')
    } else if (p === 'unsupported') {
      btn.textContent = t('notify_perm_unsupported'); btn.disabled = true
    }
  }

  async function onPermClick() {
    await requestPermission()
    updatePermUI()
  }

  // ── Users ─────────────────────────────────────────────────────
  async function loadUsers() {
    const { data } = await supabase
      .from('profiles')
      .select('id, email, role')
      .order('created_at')

    const sel = document.getElementById('userSelect')
    sel.innerHTML = ''
    for (const u of data || []) {
      const opt = document.createElement('option')
      opt.value = u.id
      opt.dataset.role = u.role || 'view'
      opt.textContent = u.email + (u.id === currentUserId ? ` ${t('notify_me')}` : '')
      if (u.id === currentUserId) opt.selected = true
      sel.appendChild(opt)
    }
    updateRoleBadge()
    sel.addEventListener('change', async () => {
      selectedUserId = sel.value
      updateRoleBadge()
      await reloadWatches()
      renderStudents()
    })
  }

  function updateRoleBadge() {
    const sel    = document.getElementById('userSelect')
    const opt    = sel.options[sel.selectedIndex]
    const role   = opt?.dataset.role || 'view'
    const badge  = document.getElementById('selectedRoleBadge')
    badge.textContent = ROLE_LABELS[role] || role
    badge.className   = 'role-badge ' + (ROLE_BADGE[role] || '')
  }

  // ── Watches ───────────────────────────────────────────────────
  async function reloadWatches() {
    const { data } = await supabase
      .from('user_student_watches')
      .select('student_id')
      .eq('user_id', selectedUserId)
    watchedIds = (data || []).map(r => r.student_id)
  }

  async function setWatch(studentId, watch) {
    if (watch) {
      await supabase.from('user_student_watches').upsert(
        { user_id: selectedUserId, student_id: studentId },
        { onConflict: 'user_id,student_id' }
      )
      if (!watchedIds.includes(studentId)) watchedIds.push(studentId)
    } else {
      await supabase.from('user_student_watches')
        .delete()
        .eq('user_id', selectedUserId)
        .eq('student_id', studentId)
      watchedIds = watchedIds.filter(id => id !== studentId)
    }
    // Sync localStorage only when configuring own watches
    if (selectedUserId === currentUserId) {
      localStorage.setItem('classscan_notifs', JSON.stringify(watchedIds))
    }
  }

  // ── Students ──────────────────────────────────────────────────
  async function loadStudents() {
    const { data } = await supabase
      .from('students')
      .select('id, name, nickname, photo_url')
      .eq('is_active', true)
      .order('name')
    allStudents = data || []
  }

  function renderStudents() {
    const statusEl = document.getElementById('statusMsg')
    const listEl   = document.getElementById('studentList')
    listEl.innerHTML = ''

    if (!allStudents.length) { statusEl.textContent = 'ไม่พบนักเรียน'; return }
    statusEl.textContent = ''

    for (const s of allStudents) {
      const isWatched = watchedIds.includes(s.id)

      let avatarEl
      if (s.photo_url) {
        avatarEl = `<img class="student-avatar" src="${s.photo_url}" alt="${s.name}">`
      } else {
        const initial = (s.nickname || s.name || '?')[0].toUpperCase()
        avatarEl = `<div class="avatar-placeholder">${initial}</div>`
      }

      const row = document.createElement('div')
      row.className = 'student-row'
      row.innerHTML = `
        ${avatarEl}
        <div class="student-info">
          <div class="student-name">${s.name}</div>
          <div class="student-nick">${s.nickname || ''}</div>
        </div>
        <div class="toggle-wrap">
          <span class="toggle-label">${isWatched ? t('toggle_on') : t('toggle_off')}</span>
          <label class="toggle">
            <input type="checkbox" data-id="${s.id}" ${isWatched ? 'checked' : ''}>
            <span class="slider"></span>
          </label>
        </div>
      `
      listEl.appendChild(row)
    }

    listEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', async e => {
        const studentId = e.target.dataset.id
        const watch     = e.target.checked
        e.target.disabled = true
        const label = e.target.closest('.toggle-wrap').querySelector('.toggle-label')
        label.textContent = watch ? t('toggle_on') : t('toggle_off')
        await setWatch(studentId, watch)
        e.target.disabled = false
      })
    })
  }

  init()
</script>
<script src="/js/version.js"></script>

</body>
</html>
