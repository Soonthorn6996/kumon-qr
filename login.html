<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUMON โพนพิสัย — เข้าสู่ระบบ</title>
  <style>
    :root {
      --bg:        #daeef8;
      --primary:   #f97316;
      --primary-h: #ea6c0a;
      --gold:      #c9a227;
      --navy:      #1a4a6e;
      --blue:      #5ba4cf;
      --text:      #1a202c;
      --muted:     #5a7a92;
      --border:    #b8ddf0;
      --card:      #ffffff;
      --error-bg:  #fff7ed;
      --error-fg:  #c2410c;
      --error-bd:  #fdba74;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(160deg, #b8ddf0 0%, #daeef8 50%, #fde8d0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26,74,110,.15), 0 2px 8px rgba(0,0,0,.06);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      border-top: 4px solid var(--gold);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 16px rgba(201,162,39,.25);
    }

    .logo-wrap h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--navy);
      margin-top: 12px;
      letter-spacing: .5px;
    }

    .logo-wrap p {
      color: var(--muted);
      font-size: .875rem;
      margin-top: 3px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      color: var(--text);
      background: #f5fbff;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(91,164,207,.2);
    }

    button[type=submit] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      box-shadow: 0 4px 14px rgba(249,115,22,.35);
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }

    button[type=submit]:hover  { opacity: .92; }
    button[type=submit]:active { transform: scale(.98); }
    button[type=submit]:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      color: var(--error-fg);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 14px;
      display: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: .78rem;
      color: var(--muted);
    }

    /* Mobile: shrink card padding */
    @media (max-width: 480px) {
      .card { padding: 32px 22px; border-radius: 16px; }
      .logo-wrap img { width: 72px; height: 72px; }
      .logo-wrap h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="/LOGO.jpg" alt="KUMON โพนพิสัย">
    <h1>KUMON โพนพิสัย</h1>
    <p>ระบบลงเวลาเรียน ClassScan</p>
  </div>

  <div class="divider"></div>

  <div class="error-box" id="errorMsg"></div>

  <form id="loginForm">
    <label for="email">อีเมล</label>
    <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">

    <label for="password">รหัสผ่าน</label>
    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

    <button type="submit" id="submitBtn">เข้าสู่ระบบ</button>
  </form>

  <p class="footer-note">สำหรับเจ้าหน้าที่และครูผู้สอนเท่านั้น</p>
</div>

<script src="/js/config.js"></script>
<script type="module">
  import { login } from '/js/auth.js'
  import { supabase } from '/js/supabase.js'

  const { data: { session } } = await supabase.auth.getSession()
  if (session) window.location.href = '/index.html'

  const form   = document.getElementById('loginForm')
  const errEl  = document.getElementById('errorMsg')
  const btn    = document.getElementById('submitBtn')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    errEl.style.display = 'none'
    btn.disabled = true
    btn.textContent = 'กำลังเข้าสู่ระบบ...'

    const { error } = await login(
      document.getElementById('email').value.trim(),
      document.getElementById('password').value
    )

    if (error) {
      errEl.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
      errEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'เข้าสู่ระบบ'
    } else {
      window.location.href = '/index.html'
    }
  })
</script>

</body>
</html>
