<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUMON โพนพิสัย — ตั้งรหัสผ่านใหม่</title>
  <style>
    :root {
      --bg:        #daeef8;
      --primary:   #f97316;
      --primary-h: #ea6c0a;
      --gold:      #c9a227;
      --navy:      #1a4a6e;
      --blue:      #5ba4cf;
      --text:      #1a202c;
      --muted:     #5a7a92;
      --border:    #b8ddf0;
      --card:      #ffffff;
      --error-bg:  #fff7ed;
      --error-fg:  #c2410c;
      --error-bd:  #fdba74;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(160deg, #b8ddf0 0%, #daeef8 50%, #fde8d0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26,74,110,.15), 0 2px 8px rgba(0,0,0,.06);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      border-top: 4px solid var(--gold);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 16px rgba(201,162,39,.25);
    }

    .logo-wrap h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      margin-top: 12px;
    }

    .logo-wrap p {
      color: var(--muted);
      font-size: .875rem;
      margin-top: 3px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      color: var(--text);
      background: #f5fbff;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(91,164,207,.2);
    }

    .hint {
      font-size: .78rem;
      color: var(--muted);
      margin-top: -10px;
      margin-bottom: 16px;
    }

    button[type=submit] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary), #fb923c);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      box-shadow: 0 4px 14px rgba(249,115,22,.35);
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }

    button[type=submit]:hover  { opacity: .92; }
    button[type=submit]:active { transform: scale(.98); }
    button[type=submit]:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      color: var(--error-fg);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 14px;
      display: none;
    }

    .success-box {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      border-radius: 10px;
      padding: 14px;
      font-size: .9rem;
      text-align: center;
      display: none;
    }

    .success-box a {
      display: block;
      margin-top: 12px;
      color: var(--navy);
      font-weight: 600;
      text-decoration: none;
    }
    .success-box a:hover { text-decoration: underline; }

    .loading-state {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 20px 0;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 22px; border-radius: 16px; }
    }
  </style>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="/LOGO.jpg" alt="KUMON โพนพิสัย">
    <h1>KUMON โพนพิสัย</h1>
    <p>ตั้งรหัสผ่านใหม่</p>
  </div>

  <div class="divider"></div>

  <div class="error-box" id="errorMsg"></div>
  <div class="success-box" id="successMsg"></div>

  <div class="loading-state" id="loadingState">กำลังตรวจสอบลิงก์...</div>

  <form id="resetForm" style="display:none">
    <label for="newPassword">รหัสผ่านใหม่</label>
    <input type="password" id="newPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
    <p class="hint">อย่างน้อย 6 ตัวอักษร</p>

    <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">

    <button type="submit" id="submitBtn">บันทึกรหัสผ่านใหม่</button>
  </form>
</div>

<script src="/js/config.js"></script>
<script type="module">
  import { updatePassword } from '/js/auth.js'
  import { supabase } from '/js/supabase.js'

  const loadingEl  = document.getElementById('loadingState')
  const resetForm  = document.getElementById('resetForm')
  const errEl      = document.getElementById('errorMsg')
  const successEl  = document.getElementById('successMsg')
  const btn        = document.getElementById('submitBtn')

  function showError(msg) {
    errEl.textContent = msg
    errEl.style.display = 'block'
  }

  // Supabase ส่ง token มาใน URL hash → onAuthStateChange จะยิง PASSWORD_RECOVERY
  const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      loadingEl.style.display = 'none'
      resetForm.style.display = 'block'
    } else if (event === 'SIGNED_IN' && !session) {
      // ไม่มี session → ลิงก์หมดอายุ
      loadingEl.style.display = 'none'
      showError('ลิงก์รีเซ็ตหมดอายุหรือไม่ถูกต้อง กรุณาขอลิงก์ใหม่อีกครั้ง')
    }
  })

  // fallback: ถ้า 5 วิยังไม่ได้รับ event ให้แจ้งว่าลิงก์ไม่ถูกต้อง
  const timeout = setTimeout(() => {
    if (resetForm.style.display === 'none' && loadingEl.style.display !== 'none') {
      loadingEl.style.display = 'none'
      showError('ลิงก์รีเซ็ตหมดอายุหรือไม่ถูกต้อง กรุณาขอลิงก์ใหม่อีกครั้ง')
    }
  }, 5000)

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearTimeout(timeout)
    errEl.style.display = 'none'

    const newPw  = document.getElementById('newPassword').value
    const confPw = document.getElementById('confirmPassword').value

    if (newPw !== confPw) {
      showError('รหัสผ่านทั้งสองช่องไม่ตรงกัน')
      return
    }
    if (newPw.length < 6) {
      showError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร')
      return
    }

    btn.disabled = true
    btn.textContent = 'กำลังบันทึก...'

    const { error } = await updatePassword(newPw)
    subscription.unsubscribe()

    if (error) {
      showError('เกิดข้อผิดพลาด: ' + error.message)
      btn.disabled = false
      btn.textContent = 'บันทึกรหัสผ่านใหม่'
    } else {
      resetForm.style.display = 'none'
      successEl.innerHTML = 'ตั้งรหัสผ่านใหม่สำเร็จแล้ว!<a href="/login.html">กลับหน้าเข้าสู่ระบบ</a>'
      successEl.style.display = 'block'
    }
  })
</script>

</body>
</html>
